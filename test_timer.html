<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #12283F;
            color: white;
        }
        
        .test-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            background-color: #A79DFD;
            border-radius: 10px;
            color: #12283F;
        }
        
        .circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: conic-gradient(#1e3a8a 0%, rgba(255, 255, 255, 0.3) 0%);
            margin: 20px auto;
            transition: background 0.1s ease;
        }
        
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        
        button {
            background: #1e3a8a;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background: #2563eb;
        }
        
        .status {
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .timer-info {
            text-align: center;
            font-size: 12px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h2>Timer Circle Test</h2>
        <p>This test simulates the timer functionality to verify the circle animation and reset behavior.</p>
        
        <div class="circle" id="testCircle"></div>
        
        <div class="controls">
            <button onclick="startTimer()">Start Timer (10s)</button>
            <button onclick="resetTimer()">Reset Timer (✔)</button>
            <button onclick="stopTimer()">Stop Timer</button>
        </div>
        
        <div class="status" id="status">Ready</div>
        <div class="timer-info" id="timerInfo">Timer: 0%</div>
    </div>

    <script>
        const DURATION = 10 * 1000; // 10 seconds for testing
        let endTime = null;
        let animationId = null;
        
        const circle = document.getElementById('testCircle');
        const status = document.getElementById('status');
        const timerInfo = document.getElementById('timerInfo');
        
        function startTimer() {
            endTime = Date.now() + DURATION;
            status.textContent = 'Timer Running';
            animate();
        }
        
        function resetTimer() {
            // Immediately reset circle to 0% to provide instant visual feedback
            circle.style.background = "conic-gradient(#1e3a8a 0%, rgba(255, 255, 255, 0.3) 0%)";
            status.textContent = 'Timer Reset - Restarting';
            timerInfo.textContent = 'Timer: 0%';
            
            // Simulate a small delay like the chrome.runtime.sendMessage would have
            setTimeout(() => {
                startTimer();
            }, 100);
        }
        
        function stopTimer() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            endTime = null;
            circle.style.background = "conic-gradient(#1e3a8a 0%, rgba(255, 255, 255, 0.3) 0%)";
            status.textContent = 'Timer Stopped';
            timerInfo.textContent = 'Timer: 0%';
        }
        
        function animate() {
            function frame() {
                if (!endTime) return;
                
                const progress = 100 - ((endTime - Date.now()) / DURATION) * 100;
                const pct = Math.min(Math.max(progress, 0), 100);
                
                circle.style.background = `conic-gradient(#1e3a8a ${pct}%, rgba(255, 255, 255, 0.3) ${pct}%)`;
                timerInfo.textContent = `Timer: ${pct.toFixed(1)}%`;
                
                if (pct >= 100) {
                    status.textContent = 'Timer Finished!';
                    circle.style.background = "conic-gradient(#1e3a8a 100%, #1e3a8a 100%)";
                    return;
                }
                
                if (pct < 100) {
                    animationId = requestAnimationFrame(frame);
                }
            }
            animationId = requestAnimationFrame(frame);
        }
        
        // Test the CSP fix by ensuring no inline handlers are used
        console.log('Timer test loaded successfully - no CSP violations should occur');
    </script>
</body>
</html>
