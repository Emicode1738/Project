<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PJTSite</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Poppins:wght@600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="berry.png" alt="Berry Logo" class="logo">
            <h1 class="brand-text">Login</h1>
        </div>
        
        <div class="content">
            <h2 class="form-title">Welcome Back</h2>
            <p class="form-subtitle">Sign in to your account</p>
            
            <div id="message" class="message"></div>

            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <input id="username" type="text" placeholder="Username" required>
                </div>

                <div class="input-group">
                    <input id="password" type="password" placeholder="Password" required>
                </div>

                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <div class="form-footer">
                <p>Don't have an account?</p>
                <button id="goToRegisterBtn" class="btn btn-secondary">Create Account</button>
            </div>
        </div>
    </div>

    <script src="db.js"></script>
    <script src="login.js"></script>
</body>
</html>
